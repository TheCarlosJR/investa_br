name: investa_br
description: "Investa BR — renda fixa e ações da B3 (mobile + desktop)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado & navegação
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Rede
  dio: ^5.7.0

  # Persistência local NoSQL/JSON + import/export
  sembast: ^3.8.0
  path_provider: ^2.1.5
  path: ^1.9.0
  file_picker: ^8.1.6
  share_plus: ^10.1.3
  uuid: ^4.5.1
  crypto: ^3.0.6

  # Formatação / i18n (intl é fixado pelo flutter_localizations)
  intl: any

  # UI
  fl_chart: ^0.69.2
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
